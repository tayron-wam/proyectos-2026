<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Metas 2026 — Tayron Prieto</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --card2: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #94a3b8;
      --green: #10b981;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --purple: #8b5cf6;
      --red: #ef4444;
      --nav-h: 68px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: var(--nav-h);
    }

    /* ── HEADER ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg,#3b82f6,#8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: white; flex-shrink: 0;
    }
    .header-right { text-align: right; }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-date { font-size: 12px; color: var(--muted); }

    /* ── MAIN ── */
    .main { padding: 16px; max-width: 720px; margin: 0 auto; }

    /* ── SECTIONS ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── SECTION HEADER ── */
    .sec-title { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    .sec-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .card-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); margin-bottom: 14px;
    }

    /* ── PROGRESS ── */
    .prog-track {
      background: var(--border);
      border-radius: 99px; height: 6px;
      overflow: hidden; margin: 12px 0;
    }
    .prog-fill {
      height: 100%; border-radius: 99px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* ── SUMMARY ── */
    .sum-hero { text-align: center; padding: 20px 0 10px; }
    .sum-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .sum-amount { font-size: 42px; font-weight: 900; letter-spacing: -1px; }
    .sum-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .sum-pct-row { display: flex; justify-content: space-between; align-items: center; }
    .sum-pct { font-size: 28px; font-weight: 800; color: var(--green); }
    .sum-gap { font-size: 13px; color: var(--muted); }

    .area-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .area-row:last-child { border-bottom: none; }
    .area-row-left { display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .area-row-name { font-size: 14px; font-weight: 600; }
    .area-row-right { text-align: right; }
    .area-row-val { font-size: 15px; font-weight: 800; }
    .area-row-pct { font-size: 11px; color: var(--muted); }

    .last-note-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .last-note-text { font-size: 13px; line-height: 1.55; color: var(--text); }

    /* ── AREA GRID ── */
    .areas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:480px) { .areas-grid { grid-template-columns: 1fr; } }

    .area-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 16px;
      cursor: pointer; transition: border-color .2s, transform .1s, box-shadow .2s;
      user-select: none; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .area-card:active { transform: scale(.98); }
    .area-card:hover { border-color: #cbd5e1; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .area-card-name { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
    .area-card-val { font-size: 26px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 2px; }
    .area-card-meta { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .area-prog { background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
    .area-prog-fill { height: 100%; border-radius: 99px; transition: width .5s; }

    /* ── AREA DETAIL ── */
    .area-detail { display: none; }
    .area-detail.open { display: block; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 14px; cursor: pointer;
      background: none; border: none; margin-bottom: 16px; padding: 0;
    }
    .back-btn:hover { color: var(--text); }
    .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .detail-title { font-size: 20px; font-weight: 800; }
    .badge {
      margin-left: auto; padding: 4px 12px; border-radius: 99px;
      font-size: 12px; font-weight: 700;
    }

    /* ── INPUTS ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field input, .field textarea {
      width: 100%; background: #f8fafc;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 14px; color: var(--text);
      font-size: 15px; font-weight: 600; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .field textarea { resize: vertical; min-height: 90px; font-size: 14px; font-weight: 400; line-height: 1.55; }
    .field input:focus, .field textarea:focus { border-color: var(--blue); }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.98); }

    /* ── TASKS ── */
    .task-add-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .task-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 14px; color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .task-input:focus { border-color: var(--blue); }
    .task-input::placeholder { color: var(--muted); }
    .add-btn {
      background: var(--blue); color: white; border: none;
      border-radius: 12px; padding: 13px 18px; font-size: 22px;
      font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .add-btn:hover { opacity: .85; }

    .task-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); cursor: pointer; flex-shrink: 0;
      margin-top: 1px; transition: all .2s; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; color: white;
    }
    .task-check.done { background: var(--green); border-color: var(--green); }
    .task-text { flex: 1; font-size: 14px; line-height: 1.5; }
    .task-text.done { text-decoration: line-through; color: var(--muted); }
    .task-del { color: var(--muted); cursor: pointer; font-size: 14px; background: none; border: none; padding: 0 4px; flex-shrink: 0; }
    .task-del:hover { color: var(--red); }
    .tasks-summary { font-size: 12px; color: var(--muted); margin-bottom: 4px; }

    /* ── NOTES ── */
    .note-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
      position: relative; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .note-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .note-content { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .note-del {
      position: absolute; top: 12px; right: 12px;
      color: var(--muted); cursor: pointer; font-size: 14px;
      background: none; border: none;
    }
    .note-del:hover { color: var(--red); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 44px 20px; color: var(--muted); }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h); background: var(--card);
      border-top: 1px solid var(--border); display: flex; z-index: 100;
      box-shadow: 0 -1px 12px rgba(0,0,0,.06);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; cursor: pointer;
      color: var(--muted); font-size: 11px; font-weight: 600;
      border: none; background: none; transition: color .2s;
    }
    .nav-btn.active { color: var(--blue); }
    .nav-icon { font-size: 22px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 14px); left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #0f172a; color: #f8fafc;
      padding: 10px 22px; border-radius: 99px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all .25s; pointer-events: none; z-index: 200;
      white-space: nowrap; box-shadow: 0 8px 30px rgba(0,0,0,.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">T</div>
  <div class="header-right">
    <div class="header-title">Metas 2026</div>
    <div class="header-date" id="hDate"></div>
  </div>
</header>

<main class="main">

  <!-- ── RESUMEN ── -->
  <div class="section active" id="sec-resumen">
    <div class="sec-title">Metas 2026</div>
    <div class="sec-sub" id="subResumen">Tayron Prieto · Fase 1</div>

    <div class="card">
      <div class="sum-hero">
        <div class="sum-label">Ingresos mensuales actuales</div>
        <div class="sum-amount" id="rActual">$0</div>
        <div class="sum-meta" id="rMeta">Meta Fase 1: $0</div>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="rProg" style="background:linear-gradient(90deg,#10b981,#3b82f6);width:0%"></div>
      </div>
      <div class="sum-pct-row">
        <span class="sum-pct" id="rPct">0%</span>
        <span class="sum-gap" id="rGap">Faltan $0</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Por área</div>
      <div id="rAreas"></div>
    </div>

    <div class="card">
      <div class="card-label">Última nota</div>
      <div id="rLastNote"><span style="color:var(--muted);font-size:13px">Sin notas aún.</span></div>
    </div>
  </div>

  <!-- ── ÁREAS ── -->
  <div class="section" id="sec-areas">
    <div id="areasGrid">
      <div class="sec-title">Áreas</div>
      <div class="sec-sub">Toca un área para ver o editar</div>
      <div class="areas-grid" id="areasContent"></div>
    </div>
    <div class="area-detail" id="areaDetail">
      <button class="back-btn" onclick="closeDetail()">← Volver</button>
      <div class="card" id="areaDetailCard"></div>
    </div>
  </div>

  <!-- ── TAREAS ── -->
  <div class="section" id="sec-tareas">
    <div class="sec-title">Tareas</div>
    <div class="sec-sub" id="tasksSub">0 pendientes</div>
    <div class="task-add-row">
      <input class="task-input" id="taskIn" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()">+</button>
    </div>
    <div class="card" id="taskList"></div>
  </div>

  <!-- ── NOTAS ── -->
  <div class="section" id="sec-notas">
    <div class="sec-title">Notas</div>
    <div class="sec-sub">Ideas, decisiones y observaciones</div>
    <div class="card">
      <div class="field">
        <textarea id="notaIn" placeholder="Escribe tu nota aquí..." rows="4"></textarea>
      </div>
      <button class="btn" style="background:var(--blue);color:white" onclick="addNota()">Guardar nota</button>
    </div>
    <div id="notasList"></div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nb-resumen" onclick="go('resumen')"><span class="nav-icon">📊</span>Resumen</button>
  <button class="nav-btn" id="nb-areas"   onclick="go('areas')">  <span class="nav-icon">🏢</span>Áreas</button>
  <button class="nav-btn" id="nb-tareas"  onclick="go('tareas')"> <span class="nav-icon">✅</span>Tareas</button>
  <button class="nav-btn" id="nb-notas"   onclick="go('notas')">  <span class="nav-icon">📝</span>Notas</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────
const DEFAULTS = {
  areas: [
    {
      id:'finca-raiz', nombre:'Finca Raíz',
      actual:11000000, meta:13000000, color:'#10b981',
      plan:'Barranquilla rentas cortas para ejecutivos → publicar en Airbnb y Booking.com esta semana.\nMeta: $2-3M adicionales con buena ocupación.\nOptimizar tarifas y ocupación de propiedades actuales en Soacha.'
    },
    {
      id:'ditra', nombre:'Ditra',
      actual:10000000, meta:14000000, color:'#3b82f6',
      plan:'DSP programático (Pinterest, Video DSP, Display) → $10M, CPC $250-350.\nNuevos clientes de consultoría + WOM.\nRegularizar contabilidad: contador, Cámara de Comercio, DIAN $360k.'
    },
    {
      id:'wam', nombre:'WAM',
      actual:2000000, meta:19000000, color:'#f59e0b',
      plan:'Pauta Meta Ads activa esta semana con $1.2M/mes.\nPrimer cliente: Doctora Mora → $1.7M/mes.\nEstrategia: volumen — cerrar 11 clientes nuevos a $1.7M ticket.\nPaquetes: Esencial $500k / Semilla $1M / Crecimiento $1.8M / Premium 360 $2.5M.\n6 copies generados listos para lanzar.'
    },
    {
      id:'intereses', nombre:'Intereses',
      actual:810000, meta:4000000, color:'#8b5cf6',
      plan:'Iván: $50M al 1.12%/mes → $560k/mes.\nNubank cajitas: $30M al 10%/anual → $250k/mes.\nAl recibir $120M de Apto Soacha → desplegar al 1.12%/mes = +$1.34M adicionales.\nEvaluar subir Nubank a 1.2%/mes o CDT.'
    }
  ],
  tareas: [],
  notas: [
    {
      content: 'Meta Fase 1: llegar a $50M/mes distribución: Finca Raíz $13M, Ditra $14M, WAM $19M, Intereses $4M.\n\nEl capital por recuperar ($120M Soacha + $28M Juan Pinzón) se usará para apalancar crecimiento.\n\n$10k USD en Deel sin rentar — evaluar T-bills o HYSA en USD (~4.5%/anual).',
      date: 'Sesión inicial — 21 de mayo 2026'
    }
  ]
}

function load() {
  try { const d = localStorage.getItem('p26'); return d ? JSON.parse(d) : deepCopy(DEFAULTS); }
  catch(e) { return deepCopy(DEFAULTS); }
}
function save() { localStorage.setItem('p26', JSON.stringify(D)); }
function deepCopy(o) { return JSON.parse(JSON.stringify(o)); }

let D = load();

// ── UTILS ────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000)    return '$' + Math.round(n/1000) + 'K';
  return '$' + Math.round(n).toLocaleString('es-CO');
}
function pct(actual, meta) { return meta > 0 ? Math.round((actual/meta)*100) : 0; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── NAV ──────────────────────────────────────────────────
let cur = 'resumen';
function go(s) {
  document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('sec-'+s).classList.add('active');
  document.getElementById('nb-'+s).classList.add('active');
  cur = s;
  const renders = { resumen: renderResumen, areas: renderAreas, tareas: renderTareas, notas: renderNotas };
  renders[s]();
}

// ── RESUMEN ──────────────────────────────────────────────
function renderResumen() {
  const total = D.areas.reduce((s,a) => s+a.actual, 0);
  const goal  = D.areas.reduce((s,a) => s+a.meta,   0);
  const p     = pct(total, goal);
  const gap   = goal - total;

  document.getElementById('rActual').textContent = fmt(total);
  document.getElementById('rMeta').textContent   = 'Meta Fase 1: ' + fmt(goal) + '/mes';
  document.getElementById('rProg').style.width   = Math.min(p,100) + '%';
  document.getElementById('rPct').textContent    = p + '%';
  document.getElementById('rGap').textContent    = 'Faltan ' + fmt(gap);
  document.getElementById('subResumen').textContent = 'De ' + fmt(total) + ' a ' + fmt(goal) + '/mes';

  document.getElementById('rAreas').innerHTML = D.areas.map(a => `
    <div class="area-row">
      <div class="area-row-left">
        <div class="dot" style="background:${a.color}"></div>
        <span class="area-row-name">${a.nombre}</span>
      </div>
      <div class="area-row-right">
        <div class="area-row-val" style="color:${a.color}">${fmt(a.actual)}</div>
        <div class="area-row-pct">${pct(a.actual,a.meta)}% · meta ${fmt(a.meta)}</div>
      </div>
    </div>
  `).join('');

  if (D.notas.length > 0) {
    const n = D.notas[D.notas.length-1];
    document.getElementById('rLastNote').innerHTML = `
      <div class="last-note-date">${n.date}</div>
      <div class="last-note-text">${n.content.substring(0,180)}${n.content.length>180?'…':''}</div>
    `;
  }
}

// ── ÁREAS ────────────────────────────────────────────────
function renderAreas() {
  document.getElementById('areasGrid').style.display = 'block';
  document.getElementById('areaDetail').classList.remove('open');

  document.getElementById('areasContent').innerHTML = D.areas.map(a => {
    const p = pct(a.actual, a.meta);
    return `
      <div class="area-card" onclick="openDetail('${a.id}')">
        <div class="area-card-name">${a.nombre}</div>
        <div class="area-card-val" style="color:${a.color}">${fmt(a.actual)}</div>
        <div class="area-card-meta">Meta ${fmt(a.meta)} · ${p}%</div>
        <div class="area-prog"><div class="area-prog-fill" style="width:${Math.min(p,100)}%;background:${a.color}"></div></div>
      </div>
    `;
  }).join('');
}

function openDetail(id) {
  const a = D.areas.find(x => x.id===id);
  if (!a) return;
  const p = pct(a.actual, a.meta);

  document.getElementById('areasGrid').style.display = 'none';
  document.getElementById('areaDetail').classList.add('open');
  document.getElementById('areaDetailCard').innerHTML = `
    <div class="detail-header">
      <div class="dot" style="background:${a.color};width:14px;height:14px"></div>
      <div class="detail-title">${a.nombre}</div>
      <span class="badge" style="background:${a.color}22;color:${a.color}">${p}%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" style="width:${Math.min(p,100)}%;background:${a.color}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:18px">
      <span>${fmt(a.actual)} actual</span><span>Meta ${fmt(a.meta)}</span>
    </div>
    <div class="field">
      <label>Ingreso actual / mes</label>
      <input id="d-actual" type="number" value="${a.actual}">
    </div>
    <div class="field">
      <label>Meta mensual</label>
      <input id="d-meta" type="number" value="${a.meta}">
    </div>
    <div class="field">
      <label>Plan de acción</label>
      <textarea id="d-plan" rows="6">${a.plan||''}</textarea>
    </div>
    <button class="btn" style="background:${a.color};color:white" onclick="saveDetail('${id}')">Guardar cambios</button>
  `;
}

function closeDetail() {
  document.getElementById('areasGrid').style.display = 'block';
  document.getElementById('areaDetail').classList.remove('open');
}

function saveDetail(id) {
  const a = D.areas.find(x => x.id===id);
  if (!a) return;
  a.actual = parseFloat(document.getElementById('d-actual').value)||0;
  a.meta   = parseFloat(document.getElementById('d-meta').value)||0;
  a.plan   = document.getElementById('d-plan').value;
  save(); showToast('Guardado ✓');
  openDetail(id);
}

// ── TAREAS ───────────────────────────────────────────────
function renderTareas() {
  const pending = D.tareas.filter(t=>!t.done).length;
  document.getElementById('tasksSub').textContent = pending === 0 ? 'Todo al día 🎉' : pending + ' pendiente' + (pending>1?'s':'');

  const list = document.getElementById('taskList');
  if (D.tareas.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Sin tareas — agrega una arriba</div></div>';
    return;
  }
  // Pending first, done at bottom
  const sorted = [...D.tareas.map((t,i)=>({...t,i}))].sort((a,b)=> a.done===b.done ? 0 : a.done?1:-1);
  list.innerHTML = sorted.map(t => `
    <div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.i})">${t.done?'✓':''}</div>
      <div class="task-text ${t.done?'done':''}">${escHtml(t.text)}</div>
      <button class="task-del" onclick="delTask(${t.i})">✕</button>
    </div>
  `).join('');
}

function addTask() {
  const inp = document.getElementById('taskIn');
  const v = inp.value.trim(); if (!v) return;
  D.tareas.push({text:v, done:false});
  save(); inp.value = ''; renderTareas();
  showToast('Tarea agregada ✓');
}
function toggleTask(i) { D.tareas[i].done = !D.tareas[i].done; save(); renderTareas(); }
function delTask(i)    { D.tareas.splice(i,1); save(); renderTareas(); }

// ── NOTAS ────────────────────────────────────────────────
function renderNotas() {
  const list = document.getElementById('notasList');
  if (D.notas.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Sin notas aún</div></div>';
    return;
  }
  list.innerHTML = [...D.notas].reverse().map((n,ri) => {
    const i = D.notas.length-1-ri;
    return `
      <div class="note-item">
        <button class="note-del" onclick="delNota(${i})">✕</button>
        <div class="note-date">${n.date}</div>
        <div class="note-content">${escHtml(n.content)}</div>
      </div>
    `;
  }).join('');
}

function addNota() {
  const inp = document.getElementById('notaIn');
  const v = inp.value.trim(); if (!v) return;
  const now = new Date();
  const date = now.toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) + ' · ' +
               now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  D.notas.push({content:v, date});
  save(); inp.value=''; renderNotas();
  showToast('Nota guardada ✓');
}
function delNota(i) { D.notas.splice(i,1); save(); renderNotas(); }

// ── HELPERS ──────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ─────────────────────────────────────────────────
document.getElementById('hDate').textContent = new Date().toLocaleDateString('es-CO',{month:'short',day:'numeric',year:'numeric'});
renderResumen();
</script>
